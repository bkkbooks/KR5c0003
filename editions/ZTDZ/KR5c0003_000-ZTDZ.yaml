front:
  text: 太上玄靈北斗本命延生眞經爾時太上老君以永壽元年正月七日在泰清境上太極宫中觀見衆生億劫漂沉周廻生死或居人道生在中華或生夷狄之中或生蠻戎之内或富或貴或賤或貧暫假因縁墮於地獄爲無定故罪業牽纒魂繫隂司受苦滿足人道將違生居畜獸之中或生禽蟲之屬轉乖人道難復人身如此沉淪不自知覺爲先世迷眞之故受此輪廻乃以哀憫之心分身教化化身下降至於蜀都地神湧出扶一玉局而作髙座於是老君昇玉局坐授與天師北斗本命經訣廣宣要法普濟衆生是時老君告天師曰人身難得中土難生假使得生正法難遇多迷眞道多入邪宗多種罪根多肆巧詐多恣淫殺多好群情多縱貪嗔多沉地獄多失人身如此等縁永生不悟不知正道迷惑者多我今哀見此等衆生故垂法教爲說良縁令使知道知身性命皆憑道生了悟此因長生人道種子不絶世世爲人不生無道之郷不斷人之根本更能心修正道漸入仙宗永離輪廻超昇成道我故示汝妙法令度天民歸眞知命可以本命之日修齋設醮啓祝北斗三官五帝九府四司薦福消災奏章懇願虔誠獻禮種種香華時新五果隨世威儀清淨壇宇法天像地或於觀宇或在家庭隨力建功請行法事功徳深重不可具陳念此大聖北斗七元眞君名號當得罪業消除災衰洗蕩福壽資命善果臻身凡有急難可以焚香誦經剋期安泰於是説大聖北斗解厄應驗曰
  hash: sha256:e7bc87a2619cc6f722fd998d86acb084ff9a5cf192cc4c0333c5850c010e43e5
