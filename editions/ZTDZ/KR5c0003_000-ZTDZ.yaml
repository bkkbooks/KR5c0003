body:
  text: 大聖北斗七元君能解三災厄大聖北斗七元君能解四殺厄大聖北斗七元君能解五行厄大聖北斗七元君能解六害厄大聖北斗七元君能解七傷厄大聖北斗七元君能解八難厄大聖北斗七元君能解九星厄大聖北斗七元君能解夫妻厄大聖北斗七元君能解男女厄大聖北斗七元君能解産生厄大聖北斗七元君能解復連厄大聖北斗七元君能解疫癘厄大聖北斗七元君能解疾病厄大聖北斗七元君能解精邪厄大聖北斗七元君能解虎狼厄大聖北斗七元君能解蟲蛇厄大聖北斗七元君能解劫賊厄大聖北斗七元君能解枷捧厄大聖北斗七元君能解横死厄大聖北斗七元君能解呪誓厄大聖北斗七元君能解天羅厄大聖北斗七元君能解地網厄大聖北斗七元君能解刀兵厄大聖北斗七元君能解水火厄於是七元君大聖善通靈濟度諸厄難超出苦衆生若有急告者持誦保安寧盡憑生百福咸契於五行三魂得安徤邪魅不能停五方降眞炁萬福自來并長生超八難皆由奉七星生生身自在世世保神清善似光中影應如谷裏聲三元神共護萬聖眼同明無災亦無障永保道心寧老君曰北辰垂象而衆星拱之爲造化之樞機作人神之主宰宣威三界統御萬靈判人間善惡之期司隂府是非之目五行共禀七政同科有廻死注生之功有消災度厄之力上至帝王下及庶人尊卑雖則殊途命分俱無差别凡夫在世迷謬者多不知身屬北斗命由天府有災有患不知解謝之門祈福祈生莫曉歸眞之路致使魂神被繫禍患來纒或重病不痊或邪妖尅害連年困篤累𡻕迍邅塚訟徵呼先亡復連或上天譴責或下鬼訴誣若有此危厄如何救解急須投告北斗醮謝眞君及轉眞經認本命眞君方獲安泰以至康榮更有深妙不可盡述凡見北斗眞形頂禮恭敬北斗第一陽明貪狼太星君子生人屬之北斗第二隂精巨門元星君丑亥生人屬之北斗第三眞人禄存眞星君寅戌生人屬之北斗第四玄𡨋文曲紐星君卯酉生人屬之北斗第五丹元廉貞綱星君辰申生人屬之北斗第六北極武曲紀星君巳未生人屬之北斗第七天關破軍關星君午生人屬之北斗第八洞明外輔星君北斗第九隱光内弼星君上台虚精開德星君中台六淳司空星君下台曲生司禄星君如是眞君名號不可得聞凡有見聞能持念者皆道心深重宿有善縁得聞持誦其功徳力莫可稱量若正信男女值此眞經智慧性圓道心開發出群迷逕入希夷門歸奉眞宗逹生榮界於三元八節本命生辰北斗下日嚴置壇場轉經齋醮依儀行道其福無邊世世生生不違眞性不入邪見持經之人常持誦七元眞君所屬尊號善功圓滿亦降吉祥即說北斗呪曰北斗九辰中天大神上朝金闕下覆崐崘調理綱紀統制乾坤大魁貪狼巨門禄存文曲㢘貞武曲破軍髙上玉皇紫微帝君大周天界細入微塵何災不滅何福不臻元皇正炁來合我身天罡所指晝夜常輪俗居小人好道求靈願見尊儀永保長生三台虚精六淳曲生生我養我護我身形魁𩲃𩵄䰢魓𩳐魒尊帝急急如律令老君曰凡人性命五體悉屬本命星官之所主掌本命神將本宿星官常垂䕃祐主持人命使保天年凡俗無知終身不悟夫本命眞官毎歳六度降在人間降日爲本命限期有南陵使者三千人北斗眞君七千神將本命眞官降駕衆眞悉來擁護可以消災懴罪請福延生隨力章醮福徳増崇其有本命限期將至自身不知不設齋醮不修香火此爲輕生迷本不貴人身天司奪禄減筭除年多致夭䘮迷誤之者雖遇經訣懐不信心毀謗眞文如此之人身謝之後淪没三途漂沉諸趣永失人身深可悲哀自致斯苦若本命之日能修齋醮善逹天司一時於本命限期開轉眞經廣陳供養使三生常爲男子身富貴聦明人中殊勝其有生身果薄雖在人中貧窮下賤縱知本命無力修崇能酌水獻花𡨋心望北極稽首禮拜念本命眞君名號者亦不虚過本命限期皆得延生注福繫係人身災厄蠲除獲福無量天師歡喜踊躍作禮讃歎難可得遇無上法橋老君重告天師曰世人罪福善惡皆屬天司懴罪消災莫越修奉遇本命生辰告身中元辰驛馬削落三災九厄保見今眷屬安寜凡有上士於本命生辰持此眞文者外伏魔精内安眞性功沾水陸善及存亡悔過䖍恭漸登妙果重立玄功證虚無道乃得聖智圓通隱顯莫測出有入無逍遥雲際升入金門與聖合眞身超三界永不輪轉壽量無窮快樂自在凡有男女於本命生辰及諸齋日清淨身心焚香持此眞文自認北極本命所屬星君隨心禱祝善無不應災罪消除致感萬聖千眞俱來衛護此文所在之處千眞敬禮萬聖䕶持魔鬼潜消精靈伏匿世有災殃悉皆消滅是名北斗本命延生經訣乃修眞之逕路得道逍遥皆因此經證聖成眞皆因此經出離生死皆因此經保護男女皆因此經保命延年皆得自在永爲身寳福壽可稱保而敬之非人勿示老君說經將畢龍鶴天仙來迎還於玉亰是時天師受得妙法而作是言誓願流行以傳善士若有男女受持讀誦我當與十戒仙官所在擁護於是再拜老君而說賛曰家有北斗經本命降眞靈家有北斗經宅舍得安寧家有北斗經父母保長生家有北斗經諸猒化爲塵家有北斗經萬邪自歸正家有北斗經營業得稱情家有北斗經闔門自康徤家有北斗經子孫保榮盛家有北斗經五路自通逹家有北斗經衆惡永消滅家有北斗經六畜保興生家有北斗經疾病得痊瘥家有北斗經財物不虚耗家有北斗經横事永不起家有北斗經長保亨利貞老君曰善哉善哉汝可宣揚正教福利無邊普及衆生永霑勝善天師稽首禮謝信受奉行太上玄靈北斗本命延生眞經
