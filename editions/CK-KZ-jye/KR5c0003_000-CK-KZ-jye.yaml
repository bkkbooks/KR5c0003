front:
  text: 重刊道藏輯要
  hash: sha256:6dc9a1411114c50ffda3e182b42e4bf40225ca64b0f8ae0fa2bf04047189bc26
body:
  text: 開經玄藴咒寂寂至無宗虛峙刧仞阿豁落洞玄文誰測此幽遐一入大乘路孰計年刧多不生亦不滅欲生因蓮花超淩三界途慈心解世羅眞人無上德世世爲仙家爾時太上老君以永夀元年正月七日在太淸境上太極宫中觀見眾生億劫漂沉周迴生死或居人道生在中華或生夷狄之中或生蠻戎之內或富或貴或賤或貧暫假因緣墮於地獄爲無定故罪業牽纒魂繫陰司受苦滿足人道將違生居畜獸之中或生禽蟲之屬轉乖人道難復人身如此沉淪不自知覺爲先世迷眞之故受此輪迴乃以哀憫之心分身教化化身下降至於蜀都地神湧出扶一玉局而作高座於是老君昇玉局坐授與天師北斗本命經訣廣宣要法普濟眾生是時老君告天師曰人身難得中土難生假使得生正法難遇多迷眞道多入邪宗多種罪根多肆巧詐多恣淫殺多好羣情多縱貪嗔多沉地獄多失人身如此等緣眾生不悟不知正道迷惑者多我今哀見此等眾生故垂教法爲說良緣令使知道知身性命皆憑道生了悟此因長生人道種子不絕世世爲人不生無道之鄕不斷人之根本更能心修正道漸入仙宗永離輪迴超昇成道我故示汝妙法令度天民歸眞知命可以本命之日修齋設醮啟祝北斗三官五帝九府四司薦福消災奏章懇願䖍誠獻禮種種香花時新五果隨世威儀淸淨壇宇法天象地或於觀宇或在家庭隨力建功請行法事功德深重不可具陳念此大聖北斗七元眞君名號當得罪業消除災愆洗蕩福夀資命善果臻身凡有急難可以焚香誦經尅期安泰於是大聖北斗解厄應騐曰大聖北斗七元君能解三災厄大聖北斗七元君能解四殺厄大聖北斗七元君能解五行厄大聖北斗七元君能解六害厄大聖北斗七元君能解七傷厄大聖北斗七元君能解八難厄大聖北斗七元君能解九星厄大聖北斗七元君能解夫妻厄大聖北斗七元君能解男女厄大聖北斗七元君能解產生厄大聖北斗七元君能解復連厄大聖北斗七元君能解疫癘厄大聖北斗七元君能解疾病厄大聖北斗七元君能解精邪厄大聖北斗七元君能解虎狼厄大聖北斗七元君能解蟲蛇厄大聖北斗七元君能解劫賊厄大聖北斗七元君能解枷棒厄大聖北斗七元君能解橫死厄大聖北斗七元君能解咒誓厄大聖北斗七元君能解天羅厄大聖北斗七元君能解地網厄大聖北斗七元君能解刀兵厄大聖北斗七元君能解水火厄於是七元君大聖善通靈濟度諸厄難超出苦眾生若有急告者持誦保安平盡憑生百福咸契於五行三魂得安健邪魅不能停五方降眞炁萬福自來并長生超八難皆由奉七星生生身自在世世保神淸善似光中影應如谷裏聲三元神共護萬聖眼同明無災亦無障永保道心甯老君曰北辰垂象而眾星拱之爲造化之樞機作人神之主宰宣威三界統御萬靈判人間善惡之期司陰府是非之目五行共禀七政同科有迴死注生之功有消災度厄之力上至帝王下及庶人尊卑雖則殊途命分俱無差别凡夫在世迷謬者多不知身屬北斗命由天府有災有患不知解謝之門祈福祈生莫曉歸依之路致使魂神被繫禍患來纒或重病不痊或邪妖尅害連年困篤累𡻕迍邅塚訟徵呼先亡復連或上天譴責或下鬼訴誣若以此危厄如何救解急須投告北斗醮謝眞君及轉眞經認本命眞君方獲安泰以至康榮更有深妙不可盡述凡見北斗眞形頂禮恭敬北斗第一陽明貪狼太星君子生人屬之北斗第二陰精巨門元星君丑亥生人屬之北斗第三眞人祿存貞星君寅戌生人屬之北斗第四玄冥文曲紐星君卯酉生人屬之北斗第五丹元亷貞罡星君辰申生人屬之北斗第六北極武曲紀星君巳未生人屬之北斗第七天關破軍關星君午生人屬之北斗第八洞明外輔星君北斗第九隱光內弼星君上臺虛精開德眞君中臺六淳司空星君下臺曲生司祿星君如是眞君名號不可得聞凡有見聞能持念者皆道心深重宿有善緣得聞持誦其功德力莫可稱量若正信男女値此眞經智慧性圓道心開發出羣迷逕入希夷門歸奉眞宗達生榮界於三元八節本命生辰北斗下日嚴置壇場轉經齋醮依儀行道其福無邊世世生生不違眞性不入邪見持經之人常持誦七元眞君所屬尊號善功圓滿亦降吉祥卽說北斗咒曰北斗九辰中天大神上朝金闕下覆崑崙調理綱紀統制乾坤大魁貪狼巨門祿存文曲亷貞武曲破軍高上玉皇紫微帝君大周天界細入微塵何災不滅何福不臻元皇正炁來合我身天罡所指晝夜常輪俗居小人好道求靈願見尊儀永保長生三台虛精六淳曲生生我養我護我身形魁𩲃𩵄䰢魓𩳐魒尊帝急急如律令老君曰凡人性命五體悉屬本命星官之所主掌本命神將本宿星官常垂蔭祐主持人命使保天年凡俗無知終身不悟夫本命星官每嵗六度降在人間降日爲本命限期有南陵使者三千人北斗眞君七千神將本命眞官降駕眾眞悉來擁護可以消災懴罪請福延生隨力章醮福德增崇其有本命限期將至自身不知不設齋醮不修香火此爲輕生迷本不貴人身天司奪祿減算除年多致夭喪迷誤之者雖遇經訣懷不信心毀謗眞文如此之人身謝之後淪没三途漂沉諸趣永失人身深可悲哀自致斯苦若本命之日能修齋醮善達天司一世於本命限期開轉眞經廣陳供養使三生常爲男子身富貴聰明人中殊勝其有生身果薄雖在人中貧窮下賤縱知本命無力修崇能酌水獻花冥心望北極稽首禮拜念本命眞君名號者亦不虛過本命限期皆得延生注福繫係人身災厄蠲除獲福無量天師歡喜踴躍作禮讚歎難可得遇無上法橋老君重告天師曰世人罪福善惡皆屬天司懴罪消災莫越修奉遇本命生辰告身中元辰驛馬削落三災九厄保見今眷屬安甯凡有上士於本命生辰持此眞文者外伏魔精內安眞性功霑水陸善及存亡悔過䖍恭漸登妙果重立玄功證虛無道乃得聖智圓通隱顯莫測出有入無逍遥雲際昇入金門與聖合眞身超三界永不輪轉夀量無窮快樂自在凡有男女於本命生辰及諸齋日淸淨身心焚香持此眞文自認北極本命所屬星君隨心禱祝善無不應災罪消除致感萬聖千眞俱來衞護此文所在之處千眞敬禮萬聖護持魔鬼潛消精靈伏匿世有災殃悉皆消滅是名北斗本命延生經訣乃修眞之逕路得道消遥皆因此經證聖成眞皆因此經出離生死皆因此經保護男女皆因此經保命延年皆得自在永爲身寶福夀可稱保而敬之非人勿示老君說經將畢龍鶴天仙來迎還於玉京是時天師受得妙法而作是言誓願流行以傳善士若有男女受持讀誦我當與十戒仙官所在擁護於是再拜老君而說贊曰家有北斗經本命降眞靈家有北斗經宅舍得安甯家有北斗經父母保長生家有北斗經諸猒化爲塵家有北斗經萬邪自歸正家有北斗經營業得稱情家有北斗經闔門自康健家有北斗經子孫保榮盛家有北斗經五路自通達家有北斗經眾惡永消滅家有北斗經六畜保興生家有北斗經疾病得痊瘥家有北斗經財物不虛耗家有北斗經橫事永不起家有北斗經長保亨利貞老君曰善哉善哉汝可宣揚正教福利無邊普及眾生永霑勝善天師稽首禮謝信受奉行太上玄靈北斗本命延生眞經
